name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # Caches pip's wheel cache so only the first run pays for downloads.
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache
          key: ${{ runner.os }}-py314-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py314-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q
